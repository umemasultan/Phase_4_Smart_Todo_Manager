apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.frontend.name }}
    governance: spec-driven-ai-operated
  annotations:
    governance/security: {{ .Values.governance.security_policy }}
    governance/compliance: {{ .Values.governance.compliance_level }}
    deployment/strategy: {{ .Values.deployment.strategy }}
    scaling/horizontal: "true"
    scaling/cpu-threshold: "{{ .Values.scaling.horizontal_scaling.cpu_threshold }}"
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  strategy:
    type: {{ .Values.deployment.strategy }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.maxSurge }}
      maxUnavailable: {{ .Values.deployment.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ .Values.frontend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.frontend.name }}
        governance: spec-driven-ai-operated
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.path }}
              port: 80
            initialDelaySeconds: {{ .Values.frontend.healthCheck.initialDelay }}
            periodSeconds: {{ .Values.frontend.healthCheck.period }}
          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.healthCheck.path }}
              port: 80
            initialDelaySeconds: {{ .Values.frontend.healthCheck.initialDelay }}
            periodSeconds: {{ .Values.frontend.healthCheck.period }}
      {{- if .Values.frontend.nodeSelector }}
      nodeSelector: {{- toYaml .Values.frontend.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.tolerations }}
      tolerations: {{- toYaml .Values.frontend.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.frontend.affinity }}
      affinity: {{- toYaml .Values.frontend.affinity | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.frontend.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.frontend.name }}
    governance: spec-driven-ai-operated
  annotations:
    governance/compliance: {{ .Values.governance.compliance_level }}
    service/type: {{ .Values.frontend.service.type }}
    service/access: external
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      {{- if eq .Values.frontend.service.type "NodePort" }}
      nodePort: {{ .Values.frontend.service.nodePort }}
      {{- end }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.frontend.name }}