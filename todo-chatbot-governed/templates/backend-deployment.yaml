apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.backend.name }}
    governance: spec-driven-ai-operated
  annotations:
    governance/security: {{ .Values.governance.security_policy }}
    governance/compliance: {{ .Values.governance.compliance_level }}
    deployment/strategy: {{ .Values.deployment.strategy }}
    scaling/horizontal: "true"
    scaling/cpu-threshold: "{{ .Values.scaling.horizontal_scaling.cpu_threshold }}"
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: {{ .Values.deployment.strategy }}
    rollingUpdate:
      maxSurge: {{ .Values.deployment.maxSurge }}
      maxUnavailable: {{ .Values.deployment.maxUnavailable }}
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
        governance: spec-driven-ai-operated
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          env: {{- toYaml .Values.backend.env | nindent 12 }}
          resources: {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.livenessPath }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: {{ .Values.backend.healthCheck.livenessInitialDelay }}
            periodSeconds: {{ .Values.backend.healthCheck.period }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.readinessPath }}
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: {{ .Values.backend.healthCheck.readinessInitialDelay }}
            periodSeconds: {{ .Values.backend.healthCheck.period }}
      {{- if .Values.backend.nodeSelector }}
      nodeSelector: {{- toYaml .Values.backend.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.tolerations }}
      tolerations: {{- toYaml .Values.backend.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.affinity }}
      affinity: {{- toYaml .Values.backend.affinity | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: {{ .Values.backend.name }}
    governance: spec-driven-ai-operated
  annotations:
    governance/compliance: {{ .Values.governance.compliance_level }}
    service/type: {{ .Values.backend.service.type }}
    service/access: internal
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ .Values.backend.name }}